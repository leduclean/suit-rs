[package]
name = "cose_minicbor"
repository = "https://github.com/leduclean/suit-rs" 
version = "0.1.0"
edition = "2024"

[dependencies]
minicbor = { version = "2.1.1", default-features = false, features = ["derive"] }
minicbor-adapters = { version = "0.0.8", default-features = false }
suit_cbor = {version = "0.1.0", path = "../suit_cbor"}
cbor-macro = { version = "0.1.0", default-features = false }
cboritem = { version = "0.1.3", default-features = false }
cbor-diag = { version = "0.1.12", default-features = false }


thiserror = { version = "2.0.17", default-features = false }
heapless = { version = "0.9.1", default-features = false }


hex-literal = { version = "1.0.0", default-features = false }


p256 = { version = "0.13.2", features = ["ecdsa", "ecdh"], default-features = false }
p521 = { version = "0.13.3", features=["ecdh"], default-features = false }
sha2 = { version = "0.10.9", default-features = false }
sha3 = { version = "0.10.8", default-features = false }
hmac = { version = "0.12.1", default-features = false }
hbs-lms = { version = "0.1.1", default-features = false }
ed25519-dalek = { version = "2.2.0", default-features = false }
aes-kw = { version = "0.2.1", default-features = false }
hex = "0.4.3"
hkdf = { version = "0.12.4", default-features = false }
